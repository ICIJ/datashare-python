[project]
name = "datashare-workflows-worker"
dynamic = ["version"]
description = "Single workflow worker to run all datashare workflows"
authors = [
  { name = "Clément Doumouro", email = "cdoumouro@icij.org" },
  { name = "Clément Doumouro", email = "clement.doumouro@gmail.com" },
]
readme = "README.md"
requires-python = ">=3.11.0, <3.13"
dependencies = [
  "datashare-asr-worker",
  "datashare-python==0.8.5",
  "datashare-translation-worker==0.5.12",
]

[tool.hatch.build.targets.wheel]
packages = ["main"]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.uv-dynamic-versioning]
fallback-version = "0.1.0"

[tool.hatch.version]
source = "uv-dynamic-versioning"
