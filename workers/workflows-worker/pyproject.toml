[project]
name = "datashare-workflows-worker"
version = "0.4.6"
description = "Single workflow worker to run all datashare workflows"
authors = [
  { name = "Clément Doumouro", email = "cdoumouro@icij.org" },
  { name = "Clément Doumouro", email = "clement.doumouro@gmail.com" },
]
readme = "README.md"
requires-python = ">=3.11.0, <3.13"
dependencies = [
  "datashare-asr-worker==0.8.0",
  "datashare-python==0.8.5",
  "datashare-translation-worker==0.6.6",
]

[tool.hatch.build.targets.wheel]
packages = ["main"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
