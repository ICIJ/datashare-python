name: Publish datashare-python

on:
  workflow_dispatch:
  push:
    tags:
      - 'datashare-python-*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GH release
        run: gh release create "$tag" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}

  publish-datashare-python-to-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/datashare-python
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.8"
      - name: Install Python 3.11
        run: uv python install 3.11
      - name: Build
        run: cd datashare-python && uv build
      - name: Publish
        run: cd datashare-python && uv publish

  trigger-workflows-worker-publication:
    needs:
      - publish-datashare-python-to-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trigger workflow worker release
        run: |
          worker_version="${worker_version/datashare-python-/}"
          gh workflow run .github/workflows/publish_workflows_worker.yml -f worker=$worker -f worker_version="$worker_version" --ref main
        env:
          GH_TOKEN: ${{ github.token }}
          worker_version: ${{ github.ref_name }}
          worker: datashare-python

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false