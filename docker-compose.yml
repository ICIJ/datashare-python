services:
  ############################
  # shared services
  ############################
  elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_VERSION:-7.17.28}
    container_name: elasticsearch
    environment:
      - cluster.name=datashare
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - discovery.zen.minimum_master_nodes=1
      - xpack.license.self_generated.type=basic
      - xpack.security.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin=*
      - http.cors.allow-methods=OPTIONS, HEAD, GET, POST, PUT, DELETE
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --fail elasticsearch:9200/_cluster/health || exit 1" ]
      interval: 2s
      timeout: 3s
      start_period: 5s
      retries: 10
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/var/lib/elasticsearch/data

  postgres:
    # TODO: Figure out missing root user error
    image: postgres:${POSTGRESQL_VERSION:-18.1}
    container_name: postgres
    environment:
      POSTGRES_USER: datashare
      POSTGRES_PASSWORD: datashare
      POSTGRES_DB: datashare
      PGDATA: /var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-U", "datashare" ]
      interval: 2s
      retries: 5
    expose:
      - 5432
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:${REDIS_VERSION:-8.6-rc1-trixie}
    container_name: redis
    restart: on-failure
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  ############################
  # temporal
  ############################
  temporal-pre-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION-1.29}
    container_name: temporal-pre-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_DB=temporal
      - POSTGRES_VISIBILITY_DB=temporal_visibility
      - POSTGRES_PORT=5432
      - POSTGRES_USER=datashare
      - POSTGRES_PWD=datashare
      - POSTGRES_SEEDS=postgres
    volumes:
      - .testcontainers/temporal:/scripts/
    entrypoint: [ "/bin/bash" ]
    command: /scripts/pre-init.sh

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION:-1.29.2}
    container_name: temporal
    depends_on:
      postgres:
        condition: service_healthy
      temporal-pre-init:
        condition: service_completed_successfully
    environment:
      - DB=postgres12_pgx
      - DB_PORT=5432
      - POSTGRES_USER=datashare
      - POSTGRES_PWD=datashare
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
    healthcheck:
      test: [ "CMD", "nc", "-z", "temporal", "7233" ]
      interval: 2s
      timeout: 3s
      start_period: 5s
      retries: 10
    ports:
      - "7233:7233"
    volumes:
      - .testcontainers/temporal:/etc/temporal/.config/temporalio/

  temporal-post-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION-1.29}
    container_name: temporal-post-init
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - .testcontainers/temporal:/scripts
    entrypoint: [ "/bin/sh" ]
    command: /scripts/post-init.sh

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-2.45.3}
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"

  ############################
  # datashare
  ############################
  datashare-init:
    image: icij/datashare:${DATASHARE_VERSION:-20.14.10}
    container_name: datashare-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: >-
      --mode CLI
      --createIndex sandbox
      --dataSourceUrl jdbc:postgresql://postgres/datashare?user=datashare\&password=datashare
      --queueType REDIS
      --redisAddress redis://redis:6379
      --elasticsearchAddress http://elasticsearch:9200

  datashare:
    image: icij/datashare:${DATASHARE_VERSION:-20.14.10}
    container_name: datashare
    hostname: datashare
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      datashare-init:
        condition: service_completed_successfully
    environment:
      DS_DOCKER_MOUNTED_DATA_DIR: ${PWD}/data
      TEMPORAL_ADDRESS: http://temporal:7233
    ports:
      - "8080:8080"
    command: >-
      --mode SERVER
      --taskRoutingStrategy GROUP
      --dataDir /home/datashare/Datashare
      --pluginsDir /home/datashare/plugins
      --extensionsDir /home/datashare/extensions
      --authFilter org.icij.datashare.session.YesCookieAuthFilter
      --dataSourceUrl jdbc:postgresql://postgres/datashare?user=datashare\&password=datashare
      --defaultProject sandbox
      --elasticsearchAddress http://elasticsearch:9200
      --rootHost http://localhost:8080
      --queueType REDIS
      --redisAddress redis://redis:6379
      --sessionStoreType REDIS
      --sessionTtlSeconds 43200
      --tcpListenPort 8080
      --batchQueueType TEMPORAL
      --messageBusAddress temporal:7233

  workflow-worker:
    build:
      context: workers/workflows-worker
      target: datashare-workflows-worker
    depends_on:
      temporal-post-init:
        condition: service_completed_successfully
    environment:
      DS_WORKER_LOGGING__FORMAT: default
      DS_WORKER_LOG_LEVEL_MAX_CONCURRENT_IO_ACTIVITIES: 10
      # Temporal
      DS_WORKER_TEMPORAL__HOST: "temporal:7233"
      DS_WORKER_TEMPORAL__NAMESPACE: "datashare-default"

      DS_WORKER_DOCS_ROOT: ""
      DS_WORKER_ARTIFACTS_ROOT: ""
      DS_WORKER_WORKDIR: ""

  asr-io-worker:
    build:
      context: workers/asr-worker
      target: io-worker
    platform: linux/amd64
    depends_on:
      temporal-post-init:
        condition: service_completed_successfully
    volumes:
      - asr-worker-data:/usr/data
    environment:
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      # General
      DS_WORKER_LOGGING__FORMAT: default
      # Temporal
      DS_WORKER_TEMPORAL__HOST: "temporal:7233"
      DS_WORKER_TEMPORAL__NAMESPACE: "datashare-default"
      # ES
      DS_WORKER_ELASTICSEARCH__ADDRESS: "http://elasticsearch:9200"
      DS_WORKER_ELASTICSEARCH__DEFAULT_PAGE_SIZE: "1000"
      DS_WORKER_ELASTICSEARCH__KEEP_ALIVE: "10m"
      DS_WORKER_ELASTICSEARCH__MAX_CONCURRENCY: "5"
      DS_WORKER_ELASTICSEARCH__MAX_RETRIES: "5"
      DS_WORKER_ELASTICSEARCH__MAX_RETRY_WAIT_S: "60"
      DS_WORKER_ELASTICSEARCH__TIMEOUT_S: "300"
      # ASR specific
      DS_WORKER_DOCS_ROOT: /usr/src/data
      DS_WORKER_ARTIFACTS_ROOT: /usr/src/data/artifacts
      DS_WORKER_WORKDIR: /usr/src/data/workdir

  asr-cpu-worker:
    build:
      context: workers/asr-worker
      target: cpu-worker
    platform: linux/amd64
    depends_on:
      temporal-post-init:
        condition: service_completed_successfully
    volumes:
      - asr-worker-data:/usr/data
    environment:
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      # General
      DS_WORKER_LOGGING__FORMAT: default
      # Temporal
      DS_WORKER_TEMPORAL__HOST: "temporal:7233"
      DS_WORKER_TEMPORAL__NAMESPACE: "datashare-default"
      # ES
      DS_WORKER_ELASTICSEARCH__ADDRESS: "http://elasticsearch:9200"
      DS_WORKER_ELASTICSEARCH__DEFAULT_PAGE_SIZE: "1000"
      DS_WORKER_ELASTICSEARCH__KEEP_ALIVE: "10m"
      DS_WORKER_ELASTICSEARCH__MAX_CONCURRENCY: "5"
      DS_WORKER_ELASTICSEARCH__MAX_RETRIES: "5"
      DS_WORKER_ELASTICSEARCH__MAX_RETRY_WAIT_S: "60"
      DS_WORKER_ELASTICSEARCH__TIMEOUT_S: "300"
      # ASR specific
      DS_WORKER_DOCS_ROOT: /usr/src/data
      DS_WORKER_ARTIFACTS_ROOT: /usr/src/data/artifacts
      DS_WORKER_WORKDIR: /usr/src/data/workdir

  asr-cpu-inference-worker:
    build:
      context: workers/asr-worker
      target: inference-cpu-worker
    platform: linux/amd64
    depends_on:
      temporal-post-init:
        condition: service_completed_successfully
    volumes:
      - asr-worker-data:/usr/data
    environment:
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      # General
      DS_WORKER_LOGGING__FORMAT: default
      # Temporal
      DS_WORKER_TEMPORAL__HOST: "temporal:7233"
      DS_WORKER_TEMPORAL__NAMESPACE: "datashare-default"
      # ES
      DS_WORKER_ELASTICSEARCH__ADDRESS: "http://elasticsearch:9200"
      DS_WORKER_ELASTICSEARCH__DEFAULT_PAGE_SIZE: "1000"
      DS_WORKER_ELASTICSEARCH__KEEP_ALIVE: "10m"
      DS_WORKER_ELASTICSEARCH__MAX_CONCURRENCY: "5"
      DS_WORKER_ELASTICSEARCH__MAX_RETRIES: "5"
      DS_WORKER_ELASTICSEARCH__MAX_RETRY_WAIT_S: "60"
      DS_WORKER_ELASTICSEARCH__TIMEOUT_S: "300"
      # ASR specific
      DS_WORKER_DOCS_ROOT: /usr/src/data
      DS_WORKER_ARTIFACTS_ROOT: /usr/src/data/artifacts
      DS_WORKER_WORKDIR: /usr/src/data/workdir



volumes:
  elasticsearch-data:
  postgres-data:
  redis-data:
  asr-worker-data: